name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > xuanli-release.jks

      - name: Create keystore.properties
        run: |
          cat > keystore.properties << 'PROPS'
          storeFile=xuanli-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          PROPS

      - name: Build release APK
        working-directory: android
        run: gradle assembleRelease

      - name: Get version name
        id: version
        run: |
          VER=$(grep versionName android/app/build.gradle | head -1 | grep -o "'[^']*'" | tr -d "'")
          echo "name=$VER" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xuanli-v${{ steps.version.outputs.name }}
          path: xuanli-v*.apk

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: xuanli-v*.apk
          generate_release_notes: true
