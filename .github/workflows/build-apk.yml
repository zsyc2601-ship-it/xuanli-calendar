name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate signing keystore and properties
        run: |
          keytool -genkeypair -v \
            -keystore xuanli-release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias xuanli \
            -storepass xuanli2024 \
            -keypass xuanli2024 \
            -dname "CN=XuanLi Calendar, OU=CI, O=XuanLi, C=CN"
          cat > keystore.properties << EOF
          storeFile=xuanli-release.jks
          storePassword=xuanli2024
          keyAlias=xuanli
          keyPassword=xuanli2024
          EOF

      - name: Build release APK
        working-directory: android
        run: gradle assembleRelease

      - name: Get version name
        id: version
        run: |
          VER=$(grep versionName android/app/build.gradle | head -1 | grep -o "'[^']*'" | tr -d "'")
          echo "name=$VER" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xuanli-v${{ steps.version.outputs.name }}
          path: xuanli-v*.apk

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: xuanli-v*.apk
          generate_release_notes: true
